<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TANUJA_MAIN.mb</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:#292929;
  color:#ddd;
  font-family:Arial,sans-serif;
}
header{
  background:#1f1f1f;
  padding:10px 15px;
  font-size:13px;
  border-bottom:1px solid #111;
}
.logo{
  background:#00a9e8;
  color:white;
  padding:5px 8px;
  border-radius:4px;
  margin-right:8px;
}
.menu{
  background:#3b3b3b;
  padding:9px 15px;
  font-size:12px;
  white-space:nowrap;
  overflow:hidden;
}
.workspace{
  min-height:calc(100vh - 115px);
  display:flex;
  flex-direction:column;
}
.stage{
  margin:15px auto 0;
  padding:10px 16px;
  background:#202020;
  border:1px solid #666;
  border-radius:6px;
  font-size:12px;
}
.stage span{
  color:#45c5ff;
  margin-right:15px;
}
.viewport{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:25px;
  background-image:
    linear-gradient(#ffffff08 1px,transparent 1px),
    linear-gradient(90deg,#ffffff08 1px,transparent 1px);
  background-size:28px 28px;
}
.card{
  width:min(720px,100%);
  background:#202020f5;
  border:1px solid #666;
  border-radius:10px;
  padding:26px;
  box-shadow:0 12px 35px #0008;
}
h1{
  margin-top:0;
  color:white;
}
button{
  width:100%;
  padding:15px;
  border:0;
  background:#168bd3;
  color:white;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
}
button:disabled{
  background:#555;
  color:#aaa;
}
.terminal{
  font-family:Consolas,monospace;
  line-height:1.7;
}
.metric{
  margin:14px 0;
}
.metric-top{
  display:flex;
  justify-content:space-between;
}
.bar{
  height:11px;
  margin-top:6px;
  border-radius:10px;
  overflow:hidden;
  background:#444;
}
.fill{
  width:0;
  height:100%;
  background:linear-gradient(90deg,#159de9,#70dcff);
  transition:width .8s;
}
.progress{
  text-align:center;
  font-size:64px;
  font-weight:bold;
  color:#55caff;
}
.error{color:#ff7373}
.success{color:#7cf28e}
.warning{color:#ffd369}
.center{text-align:center}
.hidden{display:none}
.photos{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:20px 0;
}
.photos img{
  width:100%;
  aspect-ratio:1;
  object-fit:cover;
  border-radius:8px;
}
.final{
  font-size:25px;
  color:#ff9fbf;
  font-weight:bold;
}
.confetti{
  position:fixed;
  top:-20px;
  width:9px;
  height:14px;
  animation:fall 3s linear forwards;
}
@keyframes fall{
  to{transform:translate(var(--x),110vh) rotate(720deg)}
}
@media(max-width:600px){
  .menu{display:none}
  .viewport{padding:15px}
  .card{padding:20px}
  h1{font-size:24px}
  .progress{font-size:48px}
  .stage{font-size:10px}
}
</style>
</head>

<body>

<header>
  <b class="logo">M</b>
  RigLab Pipeline — TANUJA_MAIN.mb
</header>

<div class="menu">
  File　Edit　Create　Select　Modify　Display　Windows　Rigging　Animation　Rendering
</div>

<div class="workspace">

  <div class="stage">
    <span id="stageNumber">Stage 01 / 07</span>
    <b id="stageName">System Initialization</b>
  </div>

  <div class="viewport">
    <div class="card" id="content"></div>
  </div>

  <button id="nextButton" disabled>Initializing…</button>

</div>

<script>
const content = document.getElementById("content");
const button = document.getElementById("nextButton");
const stageNumber = document.getElementById("stageNumber");
const stageName = document.getElementById("stageName");

const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

let stage = 1;

function setStage(number, name){
  stageNumber.textContent =
    "Stage " + String(number).padStart(2,"0") + " / 07";
  stageName.textContent = name;
}

function enableButton(text){
  button.textContent = text;
  button.disabled = false;
}

async function initialize(){
  content.innerHTML = `
    <div class="center">
      <h1>INITIALIZING MAYA PIPELINE</h1>
      <p class="terminal" id="bootText">Loading Maya modules…</p>
    </div>
  `;

  const boot = document.getElementById("bootText");

  await wait(700);
  boot.innerHTML += "<br>Checking scene dependencies…";

  await wait(700);
  boot.innerHTML += "<br>Connecting to RigLab server…";

  await wait(700);
  boot.innerHTML += '<br><span class="success">SYSTEM READY</span>';

  enableButton("Import Character →");
}

async function characterImport(){
  setStage(2,"Character Import");
  button.disabled = true;

  content.innerHTML = `
    <h1>Character Import</h1>
    <p>Asset detected: <b>TANUJA_MAIN</b></p>
    <div class="bar"><div class="fill" id="importBar"></div></div>
    <p id="importStatus">Importing character data…</p>
  `;

  await wait(100);
  document.getElementById("importBar").style.width = "100%";

  await wait(1000);
  document.getElementById("importStatus").innerHTML = `
    <span class="success">Import successful.</span><br><br>
    Character integrity: 100%<br>
    Uniqueness index: ONE OF ONE
  `;

  enableButton("Build Rig →");
}

async function rigBuild(){
  setStage(3,"Rig Build");
  button.disabled = true;

  content.innerHTML = `
    <h1>Building Character Rig</h1>
    <div class="terminal" id="rigText">
      Creating skeleton hierarchy…
    </div>
  `;

  const rig = document.getElementById("rigText");

  await wait(650);
  rig.innerHTML += "<br>Generating controls…";

  await wait(650);
  rig.innerHTML += "<br>Connecting personality attributes…";

  await wait(650);
  rig.innerHTML += '<br><span class="success">Rig build successful.</span>';

  enableButton("Run Personality Analysis →");
}

const metrics = [
  ["Work Ethic",100],
  ["Sleep Schedule",12],
  ["Reply Speed",58],
  ["Tolerance for Preet",81],
  ["Rigging Skill",100],
  ["Chai Requirement",84],
  ["Music Dependency",90],
  ["Random Laughter",72],
  ["Joke Frequency",86]
];

async function personality(){
  setStage(4,"Personality Analysis");
  button.disabled = true;

  content.innerHTML = `
    <h1>Personality Analysis</h1>
    <div id="metrics"></div>
    <div class="terminal" id="birthdayError"></div>
  `;

  const box = document.getElementById("metrics");

  for(const [name,value] of metrics){
    const row = document.createElement("div");
    row.className = "metric";

    row.innerHTML = `
      <div class="metric-top">
        <span>${name}</span>
        <b>${value}%</b>
      </div>
      <div class="bar">
        <div class="fill"></div>
      </div>
    `;

    box.appendChild(row);

    await wait(100);
    row.querySelector(".fill").style.width = value + "%";
    await wait(420);
  }

  const error = document.getElementById("birthdayError");

  const lines = [
    "<br><b>Birthday Data</b>",
    '<span class="error">ACCESS DENIED</span>',
    "Error Code: BDAY-022",
    "Attempting decryption…",
    '<span class="error">FAILED</span>',
    "Searching hidden layers…",
    '<span class="warning">1 Hidden Layer Detected</span>'
  ];

  for(const line of lines){
    error.innerHTML += line + "<br>";
    await wait(600);
  }

  enableButton("Run Production QA →");
}

async function qa(){
  setStage(5,"Production QA");
  button.disabled = true;

  content.innerHTML = `
    <h1>Production QA</h1>
    <div class="terminal" id="qaText">
      Checking rig stability…
    </div>
  `;

  const qa = document.getElementById("qaText");

  const lines = [
    "Control responsiveness: PASS",
    "Personality integrity: PASS",
    "Talent levels: ABOVE EXPECTED RANGE",
    "Chai dependency: ACCEPTABLE",
    "Sleep schedule: REQUIRES PATCH",
    "Production status: READY"
  ];

  for(const line of lines){
    await wait(500);
    qa.innerHTML += "<br>" + line;
  }

  enableButton("Start Final Render →");
}

async function render(){
  setStage(6,"Final Render");
  button.disabled = true;

  content.innerHTML = `
    <h1 class="center">Rendering TANUJA_MAIN</h1>
    <div class="progress" id="percentage">0%</div>
    <div class="bar">
      <div class="fill" id="renderBar"></div>
    </div>
    <p class="center" id="renderStatus">Processing frames…</p>
  `;

  const percentage = document.getElementById("percentage");
  const renderBar = document.getElementById("renderBar");

  for(let i=0;i<=96;i+=2){
    percentage.textContent = i + "%";
    renderBar.style.width = i + "%";
    await wait(45);
  }

  await wait(800);

  content.innerHTML = `
    <h1 class="error">FINAL OUTPUT VALIDATION FAILED</h1>
    <div class="terminal">
      EmotionalDataOverflowException<br>
      Unknown encrypted asset detected<br><br>
      Asset: TANUJA_BIRTHDAY_FINAL
    </div>
  `;

  await wait(1600);

  content.innerHTML = `
    <h1>Automatic Recovery</h1>
    <div class="terminal" id="recovery">
      Searching hidden nodes…
    </div>
  `;

  const recovery = document.getElementById("recovery");

  const lines = [
    "1 hidden asset found.",
    "Decrypting…",
    '<span class="success">Recovery successful.</span>',
    "Opening hidden scene…"
  ];

  for(const line of lines){
    await wait(800);
    recovery.innerHTML += "<br>" + line;
  }

  await wait(1000);
  birthday();
}

function birthday(){
  setStage(7,"Birthday Reveal");
  button.style.display = "none";

  content.innerHTML = `
    <div class="center">
      <h1>Happy 22nd Birthday, Tanuja 🎉</h1>

      <div class="photos">
        <img src="photo1.jpg" onerror="this.style.display='none'">
        <img src="photo2.jpg" onerror="this.style.display='none'">
        <img src="photo3.jpg" onerror="this.style.display='none'">
      </div>

      <p>
        No production pipeline could ever fully calculate how talented,
        hardworking and special you are.
      </p>

      <p>
        Wishing you a year filled with happiness, exciting opportunities,
        successful projects, good health, lots of chai, great music,
        and hopefully a little more sleep.
      </p>

      <div class="terminal">
        <br>
        <b>SYSTEM MESSAGE</b><br>
        Looks like this wasn't really a production render after all.<br>
        I just wanted to wish you a very Happy Birthday.<br>
        I hope this little project made you smile.
      </div>

      <p class="final">
        FINAL STATUS:<br>
        ONE OF ONE ❤️
      </p>
    </div>
  `;

  confetti();
}

function confetti(){
  for(let i=0;i<80;i++){
    const piece = document.createElement("div");
    piece.className = "confetti";
    piece.style.left = Math.random()*100 + "vw";
    piece.style.setProperty("--x",(Math.random()*200-100)+"px");
    piece.style.background =
      `hsl(${Math.random()*360},90%,60%)`;
    piece.style.animationDelay = Math.random()*1.5 + "s";
    document.body.appendChild(piece);
    setTimeout(()=>piece.remove(),5000);
  }
}

button.addEventListener("click",()=>{
  button.disabled = true;

  if(stage===1){
    stage=2;
    characterImport();
  }
  else if(stage===2){
    stage=3;
    rigBuild();
  }
  else if(stage===3){
    stage=4;
    personality();
  }
  else if(stage===4){
    stage=5;
    qa();
  }
  else if(stage===5){
    stage=6;
    render();
  }
});

initialize();
</script>

</body>
</html>
